name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: jobs declare exactly what they need.
permissions: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  TURBO_TELEMETRY_DISABLED: '1'

jobs:
  verify:
    name: Lint, typecheck, build, test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # Reads the pinned pnpm version from the root package.json "packageManager" field.
      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # The vitest "browser" project runs against real Chromium via Playwright.
      - name: Install Playwright Chromium
        run: pnpm --dir packages/coily exec playwright install chromium --with-deps

      # The turbo "check" task is the per-package tsc; oxlint/oxfmt ran above.
      - name: Lint, typecheck, build, test
        run: pnpm turbo run check build test
